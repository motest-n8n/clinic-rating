<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DR-MO Clinic — تقييم زيارتك</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --dark: #1a1a2e;
      --accent: #c8a96e;
      --accent-light: #e8d5b0;
      --text: #2d2d2d;
      --muted: #888;
      --white: #ffffff;
      --shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 52px 44px;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--dark);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: 1px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .stars-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-direction: row-reverse;
    }

    .star {
      font-size: 48px;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      filter: grayscale(1) opacity(0.25);
      user-select: none;
      line-height: 1;
    }

    .star:hover,
    .star.active {
      filter: grayscale(0) opacity(1);
      transform: scale(1.2);
    }

    .star.active {
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.35); }
      100% { transform: scale(1.2); }
    }

    .rating-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      min-height: 24px;
      margin-bottom: 32px;
      transition: opacity 0.2s;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: 14px;
      font-family: 'Tajawal', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:hover:not(:disabled) {
      background: #2d2d4e;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .success {
      display: none;
      animation: fadeUp 0.5s ease forwards;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }

    .success h2 {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .success p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
    }

    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #bbb;
      font-weight: 400;
    }
  </style>
</head>
<body>

<div class="card">

  <div id="formState">
    <div class="logo">
      <div class="logo-icon">🦷</div>
      <span class="logo-text">DR-MO CLINIC</span>
    </div>

    <div class="divider"></div>

    <h1>كيف كانت تجربتك معنا؟</h1>
    <p class="subtitle">رأيك يهمنا جداً ويساعدنا نقدملك خدمة أحسن دايماً</p>

    <div class="stars-container" id="starsContainer">
      <span class="star" data-value="1">⭐</span>
      <span class="star" data-value="2">⭐</span>
      <span class="star" data-value="3">⭐</span>
      <span class="star" data-value="4">⭐</span>
      <span class="star" data-value="5">⭐</span>
    </div>

    <div class="rating-label" id="ratingLabel">اختار تقييمك</div>

    <button class="btn" id="submitBtn" disabled onclick="submitRating()">إرسال التقييم</button>

    <p class="footer">DR-MO Clinic — شكراً لثقتك فينا 🤍</p>
  </div>

  <div class="success" id="successState">
    <span class="success-icon">🎉</span>
    <h2>شكراً جزيلاً!</h2>
    <p>تقييمك وصلنا وبيساعدنا نتحسن أكتر وأكتر.<br>يسعدنا نشوفك تاني في DR-MO Clinic 🦷</p>
    <p class="footer" style="margin-top:24px;">DR-MO Clinic — شكراً لثقتك فينا 🤍</p>
  </div>

</div>

<script>
  const labels = {
    1: 'تجربة سيئة 😞',
    2: 'تحت المتوسط 😕',
    3: 'مقبول 😐',
    4: 'كويس جداً 😊',
    5: 'ممتاز! أنا راضي تماماً 🌟'
  };

  let selectedRating = 0;

  const params = new URLSearchParams(window.location.search);
  const patientId = params.get('patient_id') || '';
  const patientName = params.get('patient_name') || '';

  const stars = document.querySelectorAll('.star');
  const ratingLabel = document.getElementById('ratingLabel');
  const submitBtn = document.getElementById('submitBtn');

  stars.forEach(star => {
    star.addEventListener('click', () => {
      selectedRating = parseInt(star.dataset.value);
      updateStars(selectedRating);
      ratingLabel.textContent = labels[selectedRating];
      submitBtn.disabled = false;
    });

    star.addEventListener('mouseenter', () => {
      updateStars(parseInt(star.dataset.value));
    });
  });

  document.getElementById('starsContainer').addEventListener('mouseleave', () => {
    updateStars(selectedRating);
    ratingLabel.textContent = selectedRating ? labels[selectedRating] : 'اختار تقييمك';
  });

  function updateStars(value) {
    stars.forEach(s => {
      const v = parseInt(s.dataset.value);
      s.classList.toggle('active', v <= value);
    });
  }

  function submitRating() {
    if (!selectedRating) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'جاري الإرسال...';

    const webhookUrl = `https://motestt.app.n8n.cloud/webhook/rating`;

    // Hidden iframe to bypass CORS
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = webhookUrl;
    document.body.appendChild(iframe);

    setTimeout(() => showSuccess(), 1500);
  }

  function showSuccess() {
    document.getElementById('formState').style.display = 'none';
    const s = document.getElementById('successState');
    s.style.display = 'block';
  }
</script>

</body>
</html>
